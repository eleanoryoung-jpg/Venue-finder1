<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venue Tracker 芒聙聰 Field Marketing</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>冒聼聧路</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflar.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#F4F4F0}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#D0D0C8;border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:#A0A09A}
    input[type="range"]{accent-color:#0A0A0A}
    @keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
    @keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    select,input,textarea,button{font-family:'DM Sans',sans-serif}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback,useRef} = React;

// 芒聲聬芒聲聬芒聲聬 CONSTANTS 芒聲聬芒聲聬芒聲聬
const REGIONS = {
  "Northeast":["New York","Boston","Philadelphia","Washington DC","Pittsburgh"],
  "Southeast":["Atlanta","Miami","Charlotte","Nashville","Raleigh"],
  "Midwest":["Chicago","Detroit","Minneapolis","Columbus","Indianapolis"],
  "Southwest":["Dallas","Houston","Austin","Phoenix","Denver"],
  "West Coast":["San Francisco","Los Angeles","Seattle","Portland","San Diego"],
};
const EVENT_SIZES = ["Intimate (8-20)","Mid-size (20-50)","Large (50-100+)"];
const STATUSES = ["Prospect","Contacted","Booked","Used","Archived"];
const STATUS_COLORS = {Prospect:"#6B6B65",Contacted:"#2A7A5A",Booked:"#0A0A0A",Used:"#1A5C3A",Archived:"#AAAAAA"};
const STORAGE_KEY = "venue-tracker-data-v2";
const API_KEY_STORAGE = "venue-tracker-api-key";
// Load persisted photo cache from localStorage
const photoCache = (() => {
  try { return JSON.parse(localStorage.getItem(PHOTO_CACHE_KEY)) || {}; }
  catch(e) { return {}; }
})();
const savePhotoCache = () => {
  try { localStorage.setItem(PHOTO_CACHE_KEY, JSON.stringify(photoCache)); }
  catch(e) {}
};

const DISCOVER_TYPES = [
  {value:"upscale restaurants with private dining rooms",label:"Upscale restaurants with private dining"},
  {value:"Michelin star restaurants with private dining rooms",label:"Michelin Star restaurants"},
  {value:"fine dining restaurants for executive dinners",label:"Fine dining for executive dinners"},
  {value:"trendy restaurants with event spaces for networking",label:"Trendy venues for networking events"},
  {value:"restaurants and venues with large private event spaces for 50+ guests",label:"Large event spaces (50+)"},
];

const loadVenues = () => {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
    const old = localStorage.getItem("venue-tracker-data");
    if (old) return JSON.parse(old).map(v=>({...v,visited:v.status==="Visited",website:v.website||""}));
  } catch(e){}
  return [
    {id:1,name:"The Capital Grille",city:"New York",region:"Northeast",eventSizes:["Intimate (8-20)","Mid-size (20-50)"],pricePerHead:185,privateRoom:true,av:false,dietary:true,exclusivity:4,status:"Used",visited:true,website:"https://www.thecapitalgrille.com",notes:"Excellent private dining room on 2nd floor. Used for Q3 CISO dinner 芒聙聰 great feedback.",contact:"Sarah M.",phone:"(212) 555-0134",lastUsed:"2025-09-15",rating:5},
    {id:2,name:"RPM Italian",city:"Chicago",region:"Midwest",eventSizes:["Intimate (8-20)","Mid-size (20-50)"],pricePerHead:165,privateRoom:true,av:false,dietary:true,exclusivity:5,status:"Used",visited:true,website:"https://www.rpmrestaurants.com/rpm-italian",notes:"Hard to get the private room 芒聙聰 book 6+ weeks out. Clients love it.",contact:"Marco D.",phone:"(312) 555-0198",lastUsed:"2025-08-22",rating:5},
    {id:3,name:"Nobu Dallas",city:"Dallas",region:"Southwest",eventSizes:["Intimate (8-20)","Mid-size (20-50)","Large (50-100+)"],pricePerHead:210,privateRoom:true,av:true,dietary:true,exclusivity:5,status:"Booked",visited:false,website:"https://www.noburestaurants.com/dallas",notes:"Booked for Feb exec dinner. Multiple private spaces available.",contact:"Jennifer L.",phone:"(214) 555-0267",lastUsed:"",rating:0},
    {id:4,name:"The Sloane",city:"San Francisco",region:"West Coast",eventSizes:["Mid-size (20-50)","Large (50-100+)"],pricePerHead:140,privateRoom:true,av:true,dietary:true,exclusivity:3,status:"Contacted",visited:true,website:"",notes:"Modern event space with great AV setup. Rooftop option for cocktail hour.",contact:"David K.",phone:"(415) 555-0312",lastUsed:"",rating:4},
    {id:5,name:"STK Atlanta",city:"Atlanta",region:"Southeast",eventSizes:["Intimate (8-20)","Mid-size (20-50)"],pricePerHead:155,privateRoom:true,av:false,dietary:true,exclusivity:4,status:"Prospect",visited:false,website:"",notes:"Recommended by sales team. Need to do site visit.",contact:"",phone:"",lastUsed:"",rating:0},
    {id:6,name:"Mbar at Mandarin Oriental",city:"Miami",region:"Southeast",eventSizes:["Intimate (8-20)"],pricePerHead:225,privateRoom:true,av:false,dietary:true,exclusivity:5,status:"Contacted",visited:false,website:"",notes:"Ultra-premium. Perfect for C-suite intimate dinners. Ocean views.",contact:"Isabella R.",phone:"(305) 555-0445",lastUsed:"",rating:0},
    {id:7,name:"The Warehouse District Venue",city:"Minneapolis",region:"Midwest",eventSizes:["Mid-size (20-50)","Large (50-100+)"],pricePerHead:95,privateRoom:true,av:true,dietary:true,exclusivity:2,status:"Used",visited:true,website:"",notes:"Great value for larger field events. Full AV with projector and sound.",contact:"Tom H.",phone:"(612) 555-0178",lastUsed:"2025-07-10",rating:4},
    {id:8,name:"Ocean Prime",city:"Denver",region:"Southwest",eventSizes:["Intimate (8-20)","Mid-size (20-50)"],pricePerHead:170,privateRoom:true,av:false,dietary:true,exclusivity:4,status:"Prospect",visited:false,website:"https://www.oceanprime.com",notes:"Corporate dining favorite in LoDo. Multiple private rooms.",contact:"",phone:"",lastUsed:"",rating:0},
  ];
};

const guessRegion = (city) => {
  const cl = city.toLowerCase();
  for (const [r,cs] of Object.entries(REGIONS)) if (cs.some(c=>cl.includes(c.toLowerCase())||c.toLowerCase().includes(cl))) return r;
  return "";
};
const emptyVenue = () => ({id:Date.now(),name:"",city:"",region:"",eventSizes:[],pricePerHead:0,privateRoom:false,av:false,dietary:false,exclusivity:0,status:"Prospect",visited:false,website:"",notes:"",contact:"",phone:"",lastUsed:"",rating:0});

// 芒聲聬芒聲聬芒聲聬 STYLES 芒聲聬芒聲聬芒聲聬
const sel = {padding:"8px 12px",borderRadius:8,border:"1.5px solid #D8D8D0",background:"#FFFFFF",fontSize:13,fontFamily:"'DM Sans',sans-serif",color:"#0A0A0A",outline:"none",cursor:"pointer",minWidth:130,boxSizing:"border-box"};
const inp = {...sel,cursor:"text",width:"100%"};
const btnP = {padding:"10px 24px",borderRadius:8,border:"none",background:"#0A0A0A",color:"#EBF245",fontSize:13,fontFamily:"'DM Sans',sans-serif",fontWeight:700,cursor:"pointer",letterSpacing:"0.02em"};
const btnS = {...btnP,background:"transparent",color:"#0A0A0A",border:"1.5px solid #0A0A0A"};
const lbl = {fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em",color:"#6B6B65",fontFamily:"'DM Sans',sans-serif",fontWeight:600};

// 芒聲聬芒聲聬芒聲聬 SHARED COMPONENTS 芒聲聬芒聲聬芒聲聬
const Stars = ({rating,onRate,size=16,interactive=false}) => (
  <div style={{display:"flex",gap:2}}>
    {[1,2,3,4,5].map(s=>(
      <span key={s} onClick={()=>interactive&&onRate&&onRate(s)}
        style={{cursor:interactive?"pointer":"default",fontSize:size,color:s<=rating?"#0A0A0A":"#D0D0C8",userSelect:"none"}}>芒聵聟</span>
    ))}
  </div>
);

const Tag = ({children,color="#0A0A0A",filled=false}) => (
  <span style={{display:"inline-block",padding:"2px 10px",borderRadius:6,fontSize:11,fontWeight:600,letterSpacing:"0.02em",
    background:filled?color:"transparent",color:filled?(color==="#0A0A0A"?"#EBF245":"#fff"):color,
    border:`1.5px solid ${color}`,lineHeight:"20px",whiteSpace:"nowrap"}}>{children}</span>
);

const Toggle = ({checked,onChange,label}) => (
  <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:"#3A3A35"}}>
    <div onClick={()=>onChange(!checked)} style={{width:36,height:20,borderRadius:10,background:checked?"#0A0A0A":"#D0D0C8",position:"relative",cursor:"pointer",transition:"background 0.2s"}}>
      <div style={{width:16,height:16,borderRadius:8,background:checked?"#EBF245":"#fff",position:"absolute",top:2,left:checked?18:2,transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.15)"}}/>
    </div>
    {label}
  </label>
);

const Spinner = ({size=32}) => (
  <div style={{width:size,height:size,border:"3px solid #E0E0D8",borderTopColor:"#0A0A0A",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto"}}/>
);

// 芒聲聬芒聲聬芒聲聬 VENUE PHOTO 芒聲聬芒聲聬芒聲聬
const DiscCard = ({dv,savedIds,venues,saveDiscovered}) => {
  const isSaved = savedIds.has(dv._id);
  const alreadyIn = venues.some(v=>v.name.toLowerCase()===dv.name.toLowerCase());
  return (
    <div style={{background:"#fff",borderRadius:10,padding:16,border:"1.5px solid #E0E0D8",marginBottom:10,animation:"fadeIn 0.3s ease"}}
      onMouseEnter={e=>e.currentTarget.style.borderColor="#0A0A0A"}
      onMouseLeave={e=>e.currentTarget.style.borderColor="#E0E0D8"}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div style={{flex:1}}>
          <h3 style={{margin:0,fontSize:15,fontFamily:"'Playfair Display',serif",color:"#0A0A0A",fontWeight:600}}>{dv.name}</h3>
          <p style={{margin:"2px 0 0",fontSize:12,color:"#6B6B65"}}>{[dv.neighborhood,dv.cuisine].filter(Boolean).join(" 脗路 ")}</p>
        </div>
        <span style={{fontSize:13,fontWeight:700,color:"#0A0A0A",whiteSpace:"nowrap",marginLeft:8}}>{dv.priceRange}</span>
      </div>
      <p style={{fontSize:12,color:"#5A5348",lineHeight:1.5,margin:"8px 0 10px"}}>{dv.description}</p>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
        {dv.privateRoom&&<Tag color="#2A7A5A">Private Dining</Tag>}
        {dv.capacity&&<Tag color="#4A6FA5">{dv.capacity}</Tag>}
        {dv.estimatedPricePerHead>0&&<Tag color="#0A0A0A">~${dv.estimatedPricePerHead}/head</Tag>}
      </div>
      {dv.knownFor&&<p style={{fontSize:11,color:"#A0A09A",fontStyle:"italic",margin:"0 0 4px"}}>Known for: {dv.knownFor}</p>}
      {dv.website&&<a href={dv.website} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"#4A6FA5",display:"block",marginBottom:4,textDecoration:"none"}}>冒聼聰聴 {dv.website}</a>}
      {dv.sources&&<p style={{fontSize:11,color:"#4A6FA5",margin:"0 0 10px",fontWeight:500}}>冒聼聯聧 {dv.sources}</p>}
      <button onClick={()=>!isSaved&&!alreadyIn&&saveDiscovered(dv)} disabled={isSaved||alreadyIn}
        style={{...btnP,width:"100%",textAlign:"center",fontSize:12,padding:"8px 0",background:isSaved||alreadyIn?"#D0D0C8":"#0A0A0A",cursor:isSaved||alreadyIn?"default":"pointer"}}>
        {alreadyIn?"Already in Tracker":isSaved?"芒聹聯 Saved":"茂录聥 Save to Tracker"}
      </button>
    </div>
  );
};

// 芒聲聬芒聲聬芒聲聬 DISCOVER PANEL 芒聙聰 top-level to prevent re-render glitch 芒聲聬芒聲聬芒聲聬
const DiscoverPanel = React.memo(({venues,discoverCity,setDiscoverCity,discoverType,setDiscoverType,
  searchMode,setSearchMode,batchCities,setBatchCities,isSearching,batchProgress,
  discoveredVenues,savedIds,searchError,apiKey,discoverVenues,saveDiscovered,setShowDiscover}) => {

  const [citySearch,setCitySearch] = useState("");
  const [batchSelected,setBatchSelected] = useState(()=>new Set(batchCities.split(/[,\n]/).map(c=>c.trim()).filter(Boolean)));

  const allCities = useMemo(()=>{
    const rc = Object.values(REGIONS).flat();
    const vc = venues.map(v=>v.city).filter(Boolean);
    return [...new Set([...rc,...vc])].sort();
  },[venues]);

  const filteredCities = useMemo(()=>citySearch
    ? allCities.filter(c=>c.toLowerCase().includes(citySearch.toLowerCase()))
    : allCities
  ,[allCities,citySearch]);

  const toggleCity = useCallback((city)=>{
    setBatchSelected(prev=>{
      const next = new Set(prev);
      if(next.has(city)) next.delete(city); else if(next.size<15) next.add(city);
      return next;
    });
  },[]);

  useEffect(()=>{ setBatchCities([...batchSelected].join("\n")); },[batchSelected]);

  const cities = useMemo(()=>[...new Set(discoveredVenues.map(v=>v.city||"Unknown"))],[discoveredVenues]);
  const isMulti = cities.length > 1;

  return (
    <div style={{position:"fixed",top:0,left:0,width:560,height:"100vh",background:"#FFFFFF",borderRight:"1px solid #E0E0D8",zIndex:100,display:"flex",flexDirection:"column",boxShadow:"8px 0 40px rgba(0,0,0,0.1)",animation:"slideInLeft 0.25s ease"}}>
      {/* Header */}
      <div style={{padding:"24px 28px",borderBottom:"1px solid #E0E0D8",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <h2 style={{margin:0,fontSize:20,fontFamily:"'Playfair Display',serif",color:"#0A0A0A"}}>Discover Venues</h2>
            <p style={{margin:"4px 0 0",fontSize:13,color:"#6B6B65"}}>Find venues in any city to add to your tracker</p>
          </div>
          <button onClick={()=>setShowDiscover(false)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#A0A09A",padding:4}}>芒聹聲</button>
        </div>
        {/* Mode toggle */}
        <div style={{display:"flex",border:"1.5px solid #D8D8D0",borderRadius:8,overflow:"hidden",marginBottom:14}}>
          {["single","batch"].map(m=>(
            <button key={m} onClick={()=>setSearchMode(m)} style={{flex:1,padding:"7px 0",border:"none",background:searchMode===m?"#0A0A0A":"#FFFFFF",color:searchMode===m?"#EBF245":"#6B6B65",fontSize:12,cursor:"pointer",fontWeight:700}}>
              {m==="single"?"Single City":"Batch Search"}
            </button>
          ))}
        </div>
        {/* Single city */}
        {searchMode==="single"&&(
          <div style={{display:"grid",gap:10}}>
            <div>
              <label style={{...lbl,display:"block",marginBottom:4}}>City</label>
              <input value={discoverCity} onChange={e=>setDiscoverCity(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&discoverVenues()}
                placeholder="e.g. Houston, Nashville..." style={{...inp,padding:"10px 14px"}}/>
            </div>
            <div>
              <label style={{...lbl,display:"block",marginBottom:4}}>Venue Type</label>
              <select value={discoverType} onChange={e=>setDiscoverType(e.target.value)} style={{...sel,width:"100%",padding:"10px 14px"}}>
                {DISCOVER_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
              </select>
            </div>
            <button onClick={discoverVenues} disabled={isSearching||!discoverCity.trim()}
              style={{...btnP,padding:"11px 0",opacity:isSearching||!discoverCity.trim()?0.5:1}}>
              {isSearching?"Searching...":"Search Venues"}
            </button>
          </div>
        )}
        {/* Batch */}
        {searchMode==="batch"&&(
          <div style={{display:"grid",gap:10}}>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <label style={lbl}>Select Cities <span style={{color:"#0A0A0A",fontWeight:700}}>({batchSelected.size}/15)</span></label>
                {batchSelected.size>0&&<button onClick={()=>setBatchSelected(new Set())} style={{background:"none",border:"none",fontSize:11,color:"#6B6B65",cursor:"pointer",fontWeight:600,padding:0}}>Clear all</button>}
              </div>
              {batchSelected.size>0&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                  {[...batchSelected].map(city=>(
                    <span key={city} onClick={()=>toggleCity(city)}
                      style={{display:"inline-flex",alignItems:"center",gap:4,background:"#0A0A0A",color:"#EBF245",padding:"3px 10px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                      {city} <span style={{fontSize:14,lineHeight:1}}>脙聴</span>
                    </span>
                  ))}
                </div>
              )}
              <input value={citySearch} onChange={e=>setCitySearch(e.target.value)}
                placeholder="Search cities..." style={{...inp,padding:"8px 12px",borderRadius:batchSelected.size<15?"8px 8px 0 0":8}}/>
              {batchSelected.size<15&&(
                <div style={{maxHeight:160,overflowY:"auto",border:"1.5px solid #D8D8D0",borderTop:"none",borderRadius:"0 0 8px 8px",background:"#FFFFFF"}}>
                  {filteredCities.filter(c=>!batchSelected.has(c)).length===0
                    ? <p style={{padding:"10px 12px",fontSize:13,color:"#A0A09A",margin:0}}>No cities found</p>
                    : filteredCities.filter(c=>!batchSelected.has(c)).map(city=>(
                      <div key={city} onClick={()=>toggleCity(city)}
                        style={{padding:"8px 14px",fontSize:13,color:"#0A0A0A",cursor:"pointer",borderBottom:"1px solid #F4F4F0"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#EBF245"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        {city}
                        {venues.some(v=>v.city===city)&&<span style={{fontSize:11,color:"#6B6B65",marginLeft:6}}>({venues.filter(v=>v.city===city).length} saved)</span>}
                      </div>
                    ))
                  }
                </div>
              )}
            </div>
            <div>
              <label style={{...lbl,display:"block",marginBottom:4}}>Venue Type</label>
              <select value={discoverType} onChange={e=>setDiscoverType(e.target.value)} style={{...sel,width:"100%",padding:"10px 14px"}}>
                {DISCOVER_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
              </select>
            </div>
            {isSearching&&batchProgress.total>1&&(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:"#3A3A35",fontWeight:600}}>Searching {batchProgress.currentCity}...</span>
                  <span style={{fontSize:12,color:"#6B6B65"}}>{batchProgress.current}/{batchProgress.total}</span>
                </div>
                <div style={{height:6,background:"#E0E0D8",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",background:"#0A0A0A",borderRadius:3,width:`${(batchProgress.current/batchProgress.total)*100}%`,transition:"width 0.5s"}}/>
                </div>
              </div>
            )}
            <button onClick={discoverVenues} disabled={isSearching||batchSelected.size===0}
              style={{...btnP,padding:"11px 0",opacity:isSearching||batchSelected.size===0?0.5:1}}>
              {isSearching?`Searching ${batchProgress.current+1}/${batchProgress.total}...`:`Search ${batchSelected.size} ${batchSelected.size===1?"City":"Cities"}`}
            </button>
          </div>
        )}
        {!apiKey&&<p style={{margin:"10px 0 0",fontSize:12,color:"#C0392B",fontWeight:600}}>芒職聽 Set up your API key in Settings to enable search.</p>}
      </div>
      {/* Results */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 28px"}}>
        {isSearching&&discoveredVenues.length===0&&(
          <div style={{padding:"32px 0",textAlign:"center"}}><Spinner/><p style={{color:"#6B6B65",fontSize:14,marginTop:12}}>Searching{batchProgress.currentCity?` ${batchProgress.currentCity}`:""}...</p></div>
        )}
        {searchError&&<div style={{background:"#FFF5F5",border:"1px solid #E8C4C4",borderRadius:10,padding:16,color:"#8B4444",fontSize:13,marginBottom:12}}>{searchError}</div>}
        {discoveredVenues.length>0&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <p style={{margin:0,fontSize:13,color:"#0A0A0A",fontWeight:700}}>{discoveredVenues.length} venues found{isSearching?" (searching...)":""}</p>
              {savedIds.size>0&&<p style={{margin:0,fontSize:12,color:"#1A5C3A",fontWeight:700}}>{savedIds.size} saved 芒聹聯</p>}
            </div>
            {isMulti?cities.map(city=>{
              const cvs = discoveredVenues.filter(v=>v.city===city);
              return (
                <div key={city} style={{marginBottom:24}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <h3 style={{margin:0,fontSize:15,fontFamily:"'Playfair Display',serif",color:"#0A0A0A"}}>{city}</h3>
                    <span style={{fontSize:11,color:"#6B6B65",background:"#F4F4F0",padding:"2px 8px",borderRadius:6,fontWeight:600}}>{cvs.length}</span>
                    <div style={{flex:1,height:1,background:"#E0E0D8"}}/>
                  </div>
                  {cvs.map(dv=><DiscCard key={dv._id} dv={dv} savedIds={savedIds} venues={venues} saveDiscovered={saveDiscovered}/>)}
                </div>
              );
            }):<>{discoveredVenues.map(dv=><DiscCard key={dv._id} dv={dv} savedIds={savedIds} venues={venues} saveDiscovered={saveDiscovered}/>)}</>}
          </div>
        )}
        {!isSearching&&!searchError&&discoveredVenues.length===0&&(
          <div style={{textAlign:"center",padding:"48px 0",color:"#A0A09A"}}>
            <p style={{fontSize:44,margin:"0 0 10px"}}>冒聼聧路</p>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:18}}>
          <div>
            <p style={{margin:"0 0 3px",fontSize:11,textTransform:"uppercase",letterSpacing:"0.15em",color:"#EBF245",fontWeight:700}}>Field Marketing</p>
            <h1 style={{margin:0,fontSize:30,fontFamily:"'Playfair Display',serif",fontWeight:600}}>Venue Tracker</h1>
          </div>
          <div style={{display:"flex",gap:24,alignItems:"flex-end",marginBottom:2,flexWrap:"wrap"}}>
            {[{l:"Total",v:stats.total},{l:"Avg $/Head",v:`$${stats.avgPrice}`},{l:"Regions",v:stats.regions},{l:"Visited",v:stats.visited},{l:"Used",v:stats.used},{l:"Booked",v:stats.booked}].map(s=>(
              <div key={s.l} style={{textAlign:"center"}}>
                <p style={{margin:0,fontSize:19,fontWeight:700,fontFamily:"'Playfair Display',serif",color:"#EBF245"}}>{s.v}</p>
                <p style={{margin:"1px 0 0",fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em",color:"#888884"}}>{s.l}</p>
              </div>
            ))}
            <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"1px solid #333",borderRadius:8,color:"#888884",padding:"7px 12px",fontSize:12,cursor:"pointer",fontWeight:600}}>芒職聶 Settings</button>
            <button onClick={exportCSV} style={{background:"none",border:"1px solid #333",borderRadius:8,color:"#888884",padding:"7px 12px",fontSize:12,cursor:"pointer",fontWeight:600}}>芒聠聯 CSV</button>
          </div>
        </div>
        <div style={{display:"flex"}}>
          {[{key:"tracker",label:"My Venues",icon:"芒聴禄"},{key:"aitools",label:"AI Tools",icon:"芒聹娄"}].map(tab=>(
            <button key={tab.key} onClick={()=>setMode(tab.key)}
              style={{padding:"11px 26px",border:"none",borderRadius:"8px 8px 0 0",fontSize:13,fontWeight:700,cursor:"pointer",
                background:mode===tab.key?"#F4F4F0":"transparent",color:mode===tab.key?"#0A0A0A":"#888884"}}>
              {tab.icon} {tab.label}
            </button>
          ))}
        </div>
      </div>

      {/* AI Tools tab */}
      {mode==="aitools"&&(
        <div style={{padding:"0 40px 40px"}}>
          <div style={{background:"#FFFFFF",borderRadius:"0 12px 12px 12px",padding:"28px 32px",border:"1px solid #E0E0D8"}}>
            <h2 style={{margin:"0 0 4px",fontSize:19,fontFamily:"'Playfair Display',serif",color:"#0A0A0A"}}>AI-Powered Event Tools</h2>
            <p style={{margin:"0 0 24px",fontSize:13,color:"#6B6B65"}}>Plan events, match venues, generate briefs 芒聙聰 powered by your tracker data.</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
              {[
                {icon:"冒聼聨炉",title:"Smart Venue Matching",desc:`Describe your event and AI picks the best from your ${venues.length} tracked venues.`,action:()=>setAiModal("match"),active:true},
                {icon:"冒聼聯聥",title:"Event Brief Generator",desc:"Full event plan with venue recs, menu, budget, and run of show.",action:()=>setAiModal("brief"),active:true},
                {icon:"芒職聳茂赂聫",title:"Venue Comparison",desc:compareIds.size>=2?`${compareIds.size} venues selected 芒聙聰 generate report.`:`Select 2-5 venues on My Venues tab. (${compareIds.size} selected)`,action:()=>{if(compareIds.size>=2)setAiModal("compare");},active:compareIds.size>=2},
                {icon:"芒聹聣茂赂聫",title:"Draft Outreach Email",desc:"Open any venue and click '芒聹聣 Email' to generate 3 booking email versions.",action:null,active:false},
                {icon:"冒聼聧陆茂赂聫",title:"Dietary & Menu Planner",desc:"Open any venue and click '冒聼聧陆 Menu' for custom menu suggestions.",action:null,active:false},
              ].map(card=>(
                <div key={card.title} onClick={card.action||undefined}
                  style={{background:"#F4F4F0",borderRadius:10,padding:20,border:"1.5px solid #E0E0D8",transition:"all 0.2s",cursor:card.action?"pointer":"default",opacity:card.action?1:0.55}}
                  onMouseEnter={e=>{if(card.action){e.currentTarget.style.borderColor="#0A0A0A";e.currentTarget.style.background="#EBF245";}}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="#E0E0D8";e.currentTarget.style.background="#F4F4F0";}}>
                  <p style={{fontSize:24,margin:"0 0 8px"}}>{card.icon}</p>
                  <h3 style={{margin:"0 0 5px",fontSize:15,fontFamily:"'Playfair Display',serif",color:"#0A0A0A"}}>{card.title}</h3>
                  <p style={{margin:0,fontSize:12,color:"#6B6B65",lineHeight:1.55}}>{card.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Tracker tab */}
      {mode==="tracker"&&(
        <React.Fragment>
          {/* Filter bar */}
          <div style={{padding:"16px 40px",background:"#FFFFFF",borderBottom:"1px solid #E0E0D8",marginLeft:leftShift,marginRight:rightShift,transition:"margin 0.25s ease"}}>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{position:"relative",flex:"0 0 210px"}}>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search venues or cities..." style={{...inp,paddingLeft:32}}/>
                <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#A0A09A",fontSize:15}}>芒聦聲</span>
              </div>
              <select value={filterRegion} onChange={e=>setFilterRegion(e.target.value)} style={sel}>
                <option value="All">All Regions</option>
                {Object.keys(REGIONS).map(r=><option key={r}>{r}</option>)}
              </select>
              <select value={filterSize} onChange={e=>setFilterSize(e.target.value)} style={sel}>
                <option value="All">All Sizes</option>
                {EVENT_SIZES.map(s=><option key={s}>{s}</option>)}
              </select>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={sel}>
                <option value="All">All Statuses</option>
                {STATUSES.map(s=><option key={s}>{s}</option>)}
              </select>
              <div style={{display:"flex",border:"1.5px solid #D8D8D0",borderRadius:8,overflow:"hidden"}}>
                {["All","Yes","No"].map(v=>(
                  <button key={v} onClick={()=>setFilterVisited(v)}
                    style={{padding:"6px 12px",border:"none",background:filterVisited===v?"#0A0A0A":"#FFFFFF",color:filterVisited===v?"#EBF245":"#6B6B65",fontSize:11,cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}>
                    {v==="All"?"All":v==="Yes"?"芒聹聯 Visited":"Not Visited"}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:11,color:"#6B6B65",whiteSpace:"nowrap"}}>芒聣陇 $</span>
                <input type="range" min={50} max={300} value={budgetMax} onChange={e=>setBudgetMax(+e.target.value)} style={{width:80}}/>
                <span style={{fontSize:12,fontWeight:700,color:"#0A0A0A",minWidth:32}}>{budgetMax}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:14,alignItems:"center",marginTop:10,flexWrap:"wrap"}}>
              <Toggle checked={filterPrivate} onChange={setFilterPrivate} label="Private Room"/>
              <Toggle checked={filterAV} onChange={setFilterAV} label="AV Ready"/>
              <Toggle checked={filterDietary} onChange={setFilterDietary} label="Dietary Flex"/>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:11,color:"#6B6B65"}}>Min Exclusivity</span>
                <Stars rating={filterExclusivity} interactive onRate={r=>setFilterExclusivity(r===filterExclusivity?0:r)} size={15}/>
              </div>
              <div style={{marginLeft:"auto",display:"flex",gap:7,alignItems:"center"}}>
                <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{...sel,minWidth:110}}>
                  <option value="name">Sort: Name</option><option value="price">Sort: Price</option>
                  <option value="exclusivity">Sort: Exclusivity</option><option value="rating">Sort: Rating</option>
                  <option value="city">Sort: City</option>
                </select>
                <div style={{display:"flex",border:"1.5px solid #D8D8D0",borderRadius:8,overflow:"hidden"}}>
                  {["grid","table"].map(v=>(
                    <button key={v} onClick={()=>setView(v)} style={{padding:"5px 12px",border:"none",background:view===v?"#0A0A0A":"#FFFFFF",color:view===v?"#EBF245":"#6B6B65",fontSize:12,cursor:"pointer",fontWeight:700}}>
                      {v==="grid"?"芒聴禄 Grid":"芒聵掳 Table"}
                    </button>
                  ))}
                </div>
                <button onClick={()=>setShowDiscover(d=>!d)}
                  style={{...btnS,padding:"7px 16px",fontSize:12,background:showDiscover?"#0A0A0A":"transparent",color:showDiscover?"#EBF245":"#0A0A0A"}}>
                  {showDiscover?"芒聹聲 Close":"芒聦聲 Discover"}
                </button>
                <button onClick={()=>setShowAddForm(true)} style={btnP}>+ Add Venue</button>
              </div>
            </div>
          </div>

          {/* Grid / Table */}
          <div style={{padding:"20px 40px 80px",marginLeft:leftShift,marginRight:rightShift,transition:"margin 0.25s ease"}}>
            <p style={{margin:"0 0 12px",fontSize:12,color:"#6B6B65"}}>Showing {filtered.length} of {venues.length} venues</p>
            {view==="grid"?(
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
                {filtered.map(v=><VenueCard key={v.id} venue={v}/>)}
              </div>
            ):(
              <div style={{background:"#FFFFFF",borderRadius:12,border:"1.5px solid #E0E0D8",overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{borderBottom:"2px solid #E0E0D8"}}>
                    {["Venue","City","Region","$/Head","Website","Visited","Exclusivity","Status","Features","Rating"].map(h=>(
                      <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em",color:"#6B6B65",fontWeight:700,background:"#F4F4F0"}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>{filtered.map(v=><VenueRow key={v.id} venue={v}/>)}</tbody>
                </table>
              </div>
            )}
            {filtered.length===0&&(
              <div style={{textAlign:"center",padding:"60px 20px",color:"#A0A09A"}}>
                <p style={{fontSize:44,margin:"0 0 10px"}}>冒聼聧陆</p>
                <p style={{fontSize:16,fontFamily:"'Playfair Display',serif",color:"#3A3A35"}}>No venues match your filters</p>
              </div>
            )}
          </div>
        </React.Fragment>
      )}

      {/* Panels + Modals */}
      {showDiscover&&mode==="tracker"&&(
        <DiscoverPanel
          venues={venues} discoverCity={discoverCity} setDiscoverCity={setDiscoverCity}
          discoverType={discoverType} setDiscoverType={setDiscoverType}
          searchMode={searchMode} setSearchMode={setSearchMode}
          batchCities={batchCities} setBatchCities={setBatchCities}
          isSearching={isSearching} batchProgress={batchProgress}
          discoveredVenues={discoveredVenues} savedIds={savedIds}
          searchError={searchError} apiKey={apiKey}
          discoverVenues={discoverVenues} saveDiscovered={saveDiscovered}
          setShowDiscover={setShowDiscover}
        />
      )}
      {selectedVenue&&<DetailPanel key={selectedVenue.id} venue={selectedVenue}/>}
      {showAddForm&&<AddForm/>}
      {showSettings&&<SettingsModal/>}
      <AiModal/>

      {/* Compare bar */}
      {compareIds.size>0&&mode==="tracker"&&(
        <div style={{position:"fixed",bottom:0,left:leftShift,right:rightShift,background:"#0A0A0A",padding:"12px 40px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:90,boxShadow:"0 -4px 20px rgba(0,0,0,0.2)",transition:"left 0.25s,right 0.25s"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{color:"#EBF245",fontSize:13,fontWeight:700}}>{compareIds.size} venue{compareIds.size>1?"s":""} selected</span>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {venues.filter(v=>compareIds.has(v.id)).map(v=><span key={v.id} style={{background:"#1A1A1A",color:"#EBF245",padding:"2px 10px",borderRadius:6,fontSize:12,fontWeight:600}}>{v.name}</span>)}
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{if(compareIds.size>=2){setMode("aitools");setAiModal("compare");}}} disabled={compareIds.size<2}
              style={{...btnP,padding:"7px 18px",fontSize:12,background:compareIds.size>=2?"#EBF245":"#333",color:compareIds.size>=2?"#0A0A0A":"#6B6B65"}}>
              芒職聳茂赂聫 Compare{compareIds.size<2?` (need ${2-compareIds.size} more)`:""}
            </button>
            <button onClick={()=>setCompareIds(new Set())} style={{...btnS,padding:"7px 14px",fontSize:12,color:"#888884",borderColor:"#333"}}>Clear</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<VenueTracker/>,document.getElementById("root"));
</script>
</body>
</html>
